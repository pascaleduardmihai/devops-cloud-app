name: Deploy to EKS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Debug Secrets
      run: |
        if [ -z "${{ secrets.AWS_REGION }}" ]; then echo "REGION is EMPTY"; else echo "REGION is SET"; fi
        if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then echo "KEY is EMPTY"; else echo "KEY is SET"; fi

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push Backend to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/task-backend:$IMAGE_TAG ./app/backend
        docker push $ECR_REGISTRY/task-backend:$IMAGE_TAG

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name task-manager-cluster --region ${{ secrets.AWS_REGION }}

    - name: Deploy to EKS
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # 1. Injectăm imaginea (căutăm linia cu image:)
        sed -i "s|image: .*|image: $ECR_REGISTRY/task-backend:$IMAGE_TAG|g" k8s/backend-deploy.yaml

        # 2. Injectăm DB_HOST (doar linia de după name: DB_HOST)
        sed -i "/name: DB_HOST/{n;s|value: \".*\"|value: \"${{ secrets.RDS_HOSTNAME }}\"|}" k8s/backend-deploy.yaml

        # 3. Ne asigurăm că DB_NAME rămâne taskdb (sau ce ai setat în RDS)
        sed -i "/name: DB_NAME/{n;s|value: \".*\"|value: \"taskdb\"|}" k8s/backend-deploy.yaml

        # Injectăm DB_PASSWORD (căutăm linia după name: DB_PASSWORD)
        sed -i "/name: DB_PASSWORD/{n;s|value: \".*\"|value: \"${{ secrets.DB_PASSWORD }}\"|}" k8s/backend-deploy.yaml

        kubectl apply -f k8s/backend-deploy.yaml
        
    - name: Build and Push Frontend to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/task-frontend:$IMAGE_TAG ./app/frontend
        docker push $ECR_REGISTRY/task-frontend:$IMAGE_TAG

    - name: Get Backend LoadBalancer DNS
      id: get-backend-dns
      run: |
        # Asteptam putin ca AWS sa aloce DNS-ul daca e prima data
        sleep 15
        BACKEND_URL=$(kubectl get svc task-backend-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        echo "backend_dns=$BACKEND_URL" >> $GITHUB_OUTPUT

    - name: Deploy Frontend to EKS
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Injectam imaginea ECR in frontend-deploy.yaml
        sed -i "s|<ACCOUNT_ID>.dkr.ecr.eu-north-1.amazonaws.com/task-frontend:latest|$ECR_REGISTRY/task-frontend:$IMAGE_TAG|g" k8s/frontend-deploy.yaml

        # Injectam URL-ul backend-ului preluat anterior
        sed -i "s|value: \"http://pending-backend-url\"|value: \"http://${{ steps.get-backend-dns.outputs.backend_dns }}\"|g" k8s/frontend-deploy.yaml

        kubectl apply -f k8s/frontend-deploy.yaml
