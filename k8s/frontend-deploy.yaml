apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-frontend
  template:
    metadata:
      labels:
        app: task-frontend
    spec:
      containers:
      - name: task-frontend
        image: <ACCOUNT_ID>.dkr.ecr.eu-north-1.amazonaws.com/task-frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: BACKEND_API_URL
          value: "http://pending-backend-url" # <--- Aici va scrie GitHub Actions
---
apiVersion: v1
kind: Service
metadata:
  name: task-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: task-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
